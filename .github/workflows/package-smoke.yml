name: Package Smoke

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter convex-inspect build
      - name: Pack package
        run: |
          cd packages/core
          npm pack
      - name: Smoke install packed package
        run: |
          TAR_PATH="$(ls /home/runner/work/convex-inspect/convex-inspect/packages/core/convex-inspect-*.tgz)"
          rm -rf /tmp/convex-inspect-smoke-ci
          mkdir -p /tmp/convex-inspect-smoke-ci
          cd /tmp/convex-inspect-smoke-ci
          pnpm init
          pnpm add react react-dom convex "$TAR_PATH"
          node -e 'console.log(require.resolve("convex-inspect/react"));'
